name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install -g npm@11 # npm 10.9.x writes an inconsistent lockfile for `ignore`

      - run: npm ci

      - run: npm run lint

      - run: npm run build
